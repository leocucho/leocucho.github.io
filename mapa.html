<!DOCTYPE html>
<html lang="en">
<head>

          </div>
        </div>
      </div>
      <div class="col-12 col-md-8">

          <select name="select-location" id="select-location">
            <option value="-1">Seleccionar lugar</option>
            <option value="6.636254,-73.223129">lima</option>

            <option value="10.42278,-75.539217">junin</option>

    </div>
    <div class="row justify-content-center">
      <div class="col-12 col-md-8">
        <div class="main-mapa mb-5">
          <div id="map" class="map">
      
          </div>
        </div>
      </div>
